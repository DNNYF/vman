schema_version: 1
name: install-cloudflare-tunnel
version: 0.1.0
description: Install cloudflared for Cloudflare Tunnel operation.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-cloudflared
  run: 'set -e

    apt-get update

    apt-get install -y curl lsb-release

    install -m 0755 -d /usr/share/keyrings

    curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg

    echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared
    $(lsb_release -cs) main" > /etc/apt/sources.list.d/cloudflared.list

    apt-get update

    apt-get install -y cloudflared

    '
verify:
- name: verify-cloudflared
  run: 'set -e

    cloudflared --version

    '
