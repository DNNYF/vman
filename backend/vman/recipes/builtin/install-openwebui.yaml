schema_version: 1
name: install-openwebui
version: 0.1.0
description: Install Open WebUI with Docker Compose.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-openwebui-compose
  run: "set -e\ncommand -v docker >/dev/null\ninstall -m 0755 -d /opt/openwebui\n\
    cat > /opt/openwebui/docker-compose.yml <<EOF\nservices:\n  open-webui:\n    image:\
    \ ghcr.io/open-webui/open-webui:main\n    restart: unless-stopped\n    ports:\n\
    \      - \"127.0.0.1:{{ port }}:8080\"\n    volumes:\n      - open-webui:/app/backend/data\n\
    volumes:\n  open-webui:\nEOF\ndocker compose -f /opt/openwebui/docker-compose.yml\
    \ up -d\n"
verify:
- name: verify-openwebui
  run: 'set -e

    docker compose -f /opt/openwebui/docker-compose.yml ps

    '
vars:
  port:
    type: int
    default: 3000
    description: Local host port to bind Open WebUI
