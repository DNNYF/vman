schema_version: 1
name: small-vps-cleanup
version: 0.1.0
description: Clean package caches, old journals, temporary files, and unused packages
  on a small Debian/Ubuntu VPS.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: clean-package-and-runtime-caches
  run: 'set -e

    apt-get clean

    apt-get autoremove -y --purge

    journalctl --vacuum-time=7d || true

    rm -rf /tmp/* /var/tmp/*

    '
verify:
- name: show-disk-after-cleanup
  run: 'set -e

    df -h /

    journalctl --disk-usage || true

    '
