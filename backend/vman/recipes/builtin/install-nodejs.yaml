schema_version: 1
name: install-nodejs
version: 0.1.0
description: Install Node.js from NodeSource.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-nodejs
  run: 'set -e

    apt-get update

    apt-get install -y ca-certificates curl gnupg

    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -

    apt-get install -y nodejs

    '
verify:
- name: verify-nodejs
  run: 'set -e

    node --version

    npm --version

    '
