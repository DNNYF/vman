schema_version: 1
name: disable-password-login
version: 0.1.0
description: Disable SSH password authentication. Confirm key-based login works first.
risk_level: high
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: true
  forbidden_on_environments:
  - production
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: disable-ssh-password-auth
  run: 'set -e

    install -d /etc/ssh/sshd_config.d

    cat > /etc/ssh/sshd_config.d/99-vman-disable-password.conf <<EOF

    PasswordAuthentication no

    KbdInteractiveAuthentication no

    ChallengeResponseAuthentication no

    EOF

    sshd -t

    systemctl reload ssh || systemctl reload sshd

    '
verify:
- name: verify-password-login-disabled
  run: 'set -e

    sshd -T | grep -E "^(passwordauthentication|kbdinteractiveauthentication) no"

    '
