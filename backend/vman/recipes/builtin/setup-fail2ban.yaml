schema_version: 1
name: setup-fail2ban
version: 0.1.0
description: Install and enable fail2ban with the default SSH jail.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-fail2ban
  run: 'set -e

    apt-get update

    apt-get install -y fail2ban

    cat > /etc/fail2ban/jail.d/vman-sshd.conf <<EOF

    [sshd]

    enabled = true

    EOF

    systemctl enable --now fail2ban

    '
verify:
- name: verify-fail2ban
  run: 'set -e

    systemctl is-active fail2ban

    fail2ban-client status sshd || fail2ban-client status

    '
