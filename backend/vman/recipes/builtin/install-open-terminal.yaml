schema_version: 1
name: install-open-terminal
version: 0.1.0
description: Install and run open-terminal as a systemd service from a provided command.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-open-terminal-service
  run: 'set -e

    install -m 0755 -d /opt/open-terminal

    cat > /etc/systemd/system/open-terminal.service <<EOF

    [Unit]

    Description=Open Terminal

    After=network-online.target

    Wants=network-online.target

    [Service]

    Type=simple

    WorkingDirectory=/opt/open-terminal

    ExecStart={{ exec_start }}

    Restart=unless-stopped

    RestartSec=5

    [Install]

    WantedBy=multi-user.target

    EOF

    systemctl daemon-reload

    systemctl enable --now open-terminal

    '
verify:
- name: verify-open-terminal
  run: 'set -e

    systemctl status open-terminal --no-pager

    '
vars:
  exec_start:
    type: string
    default: /usr/local/bin/open-terminal --host 127.0.0.1 --port 8000
    description: Systemd ExecStart for open-terminal
