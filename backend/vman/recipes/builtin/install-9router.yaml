schema_version: 1
name: install-9router
version: 0.1.0
description: Install 9router service from an operator-provided install URL.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-9router
  run: 'set -e

    apt-get update

    apt-get install -y curl ca-certificates

    if [ -n "{{ install_url }}" ]; then curl -fsSL "{{ install_url }}" | sh; else
    echo "set install_url before running"; exit 2; fi

    '
verify:
- name: verify-9router
  run: 'set -e

    if command -v 9router >/dev/null 2>&1; then 9router --version || true; else systemctl
    status 9router --no-pager || true; fi

    '
vars:
  install_url:
    type: string
    default: ''
    description: Trusted 9router install script URL
