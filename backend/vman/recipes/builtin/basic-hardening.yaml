schema_version: 1
name: basic-hardening
version: 0.1.0
description: Apply baseline SSH and firewall hardening. Review access paths before
  running.
risk_level: high
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: true
  forbidden_on_environments:
  - production
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: apply-basic-hardening
  run: 'set -e

    apt-get update

    apt-get install -y ufw fail2ban unattended-upgrades

    systemctl enable --now fail2ban

    ufw default deny incoming

    ufw default allow outgoing

    ufw allow OpenSSH || ufw allow ssh

    ufw --force enable

    '
verify:
- name: verify-basic-hardening
  run: 'set -e

    ufw status verbose

    systemctl is-active fail2ban

    '
