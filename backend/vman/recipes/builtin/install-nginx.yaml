schema_version: 1
name: install-nginx
version: 0.1.0
description: Install and enable nginx.
risk_level: medium
supported_os:
  families:
  - debian
  names:
  - ubuntu
  - debian
policy:
  requires_approval: false
  forbidden_on_environments: []
preflight:
- name: detect-debian-like-system
  run: 'set -e

    test -r /etc/os-release

    . /etc/os-release

    printf "os=%s version=%s\n" "${ID:-unknown}" "${VERSION_ID:-unknown}"

    command -v sh >/dev/null

    '
steps:
- name: install-nginx
  run: 'set -e

    apt-get update

    apt-get install -y nginx

    systemctl enable --now nginx

    '
verify:
- name: verify-nginx
  run: 'set -e

    nginx -t

    systemctl is-active nginx

    '
